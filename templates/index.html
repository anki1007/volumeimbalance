<!DOCTYPE html>
<html>
<head>
    <title>NSE Volume Scanner</title>
    <style>
        body { background:#111; color:#fff; font-family:Arial; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { padding:8px; border:1px solid #333; text-align:center; }
        th { background:#222; }
    </style>
</head>
<body>

<h2>NSE Volume Scanner</h2>

<table>
    <tr>
        <th>Symbol</th>
        <th>Sector</th>
        <th>Prev</th>
        <th>LTP</th>
        <th>Vol (Cr)</th>
        <th>Turnover</th>
        <th>%</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row.symbol }}</td>
        <td>{{ row.sector }}</td>
        <td>{{ row.prev }}</td>
        <td>{{ row.ltp }}</td>
        <td>{{ row.vol_cr }}</td>
        <td>{{ row.turnover }}</td>
        <td>{{ row.pct }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
